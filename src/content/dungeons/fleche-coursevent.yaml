      - "Devoted Woebringer : Pulsing Shriek (shield + cast) → burst shield et kick"
      - "Phantasmal Mystic : immune CC → tank garde les grunts groupés"
      - "Spindleweb : flaques acides à la mort → anticiper le positionnement"
