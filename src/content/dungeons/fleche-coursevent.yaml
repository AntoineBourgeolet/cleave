      - "[Bec incendiaire](https://www.wowhead.com/fr/spell=466064/bec-incendiaire) : 🛡️💊  Défensif actif sur le hit + DoT"

  - name: "Duo abandonné"
    points:
      - "[Lien brisé](https://www.wowhead.com/fr/spell=1219551/lien-brise) : 🛡️🗡️ Descendre Kalis et Latch de façon équilibrée sinon enrage"
      - "[Hurlement débilitant](https://www.wowhead.com/fr/spell=472736/hurlement-debilitant) : 🛡️💊🗡️ Stoppable par le [Lancer écœurant](https://www.wowhead.com/fr/spell=472795/lancer-ecoeurant)"
      - "[Malédiction de ténèbres](https://www.wowhead.com/fr/spell=474105/malediction-de-tenebres) : 🛡️💊🗡️ Dispel magie immédiat ou kiter les Entités Sombres"
      - "[Crachat éclaboussant](https://www.wowhead.com/fr/spell=472745/crachat-eclaboussant) : 🛡️💊🗡️ Espacer les flaques au sol, pour éviter d'être bloqué"
      - "[Taillade d’os](https://www.wowhead.com/fr/spell=472888/taillade-dos) : 🛡️💊 Défensif actif et gros soin"

  - name: "Commandant Kroluk"
    points:
      - "[Bond téméraire](https://www.wowhead.com/fr/spell=472054/bond-temeraire) : 💊🗡️ 1 joueur éloigné pour bait (défensif actif), groupe en stack au melee"
      - "[Cri d'intimidation](https://www.wowhead.com/fr/spell=1253026/cri-d-intimidation) : 🛡️💊🗡️ Rester près d'un allié avant la fin du cast pour éviter la peur 6s"
      - "[Saccager](https://www.wowhead.com/fr/spell=467620/saccager) : 🛡️💊 Tank doit avoir un défensif actif"
      - "[Hurlement de ralliement](https://www.wowhead.com/fr/spell=472043/hurlement-de-ralliement) : 🛡️🗡️ 66% et 33% PV → spawns adds, tank groupe, kick Mystic en priorité, DK grip l'Axethrower"

  - name: "Le cœur fébrile"
    points:
      - "[Saut venteux](https://www.wowhead.com/fr/spell=1216042/saut-venteux) (DoT sans durée) : 🛡️💊🗡️ Nettoyer stacks en sautant sur les [Flèches turbulentes](https://www.wowhead.com/fr/spell=1253977/fleche-turbulente)"
      - "[Rafale de visée](https://www.wowhead.com/fr/spell=468429/rafale-de-visee) : 🛡️💊🗡️ Boss charge au bord de l'arène → saut/blink sur flèche juste avant l'onde de choc"
      - "[Tir rafale](https://www.wowhead.com/fr/spell=1253986/tir-rafale) : 💊🗡️ Spread même loose pour effacer les flaques tout en restant en range"
      - "[Entaille tempétueuse](https://www.wowhead.com/fr/spell=472662/entaille-tempetueuse) : 🛡️💊 Tank doit avoir défensif + anticiper le knockback (viser une flèche pour l'annuler)"

trash:
