bosses:
  - name: "Aube-de-braise"
    points:
      - "[Courant ascendant flamboyant](https://www.wowhead.com/fr/spell=466556/courant-ascendant-flamboyant) (2 joueurs ciblés) : 🛡️💊🗡️ Poser en bord d'arène, défensif si besoin"
